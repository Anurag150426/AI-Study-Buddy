services:
  # ── Backend: FastAPI ──────────────────────────────────────────────────────
  - type: web
    name: ai-study-buddy-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # you will paste this manually in the dashboard
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ── Frontend: Streamlit ───────────────────────────────────────────────────
  - type: web
    name: ai-study-buddy-frontend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: BACKEND_URL
        sync: false          # set this to the backend URL after it deploys
      - key: PYTHON_VERSION
        value: "3.11.9"
